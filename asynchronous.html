const btnget=document.getElementById("getInfo");

        function authenticate(inp_id) {
            return new Promise((resolve,reject) => {
                setTimeout(() => {
                    if(inp_id == "Rana")
                {
                    console.log("Authenticated...");
                    resolve("user123");
                }
                else{
                    console.log("not valid user");
                    let err= new Error("not valid user");
                    reject(err);
                }
                }, 1000);
            }
            );
        }

        function getLocation(authtoken) {
            const city = new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (authtoken == "user123") {
                        console.log("user is valid,city is provided");
                        resolve("Goa");
                    }
                    else {
                        console.log("user not valid,no city found");
                        let err = new Error("no city found");
                        reject(err);
                    }
                }, 1000);

            });
            return city;
        }

        function getWeather(city) {
            const temp = new Promise((resolve) => {
                setTimeout(() => {
                    console.log("return temprature");
                    resolve("18c");
                }, 1000);
            });
            return temp;
        }

        function printDetails(userid,city,temp)
        {
            const result=document.getElementById("result");
            result.innerText="";
            result.innerHTML="your userid is:" + userid + "<br> You Live in <b>"+ city + "</b> <br> Temprature of this city is: <b>"+temp +"</b>";
        }

//asynchronus using async await

async function getDetails()
{
    const inp_id=document.getElementById("Iuserid").value;
    console.log("starting function..." + inp_id);
    try{
    let authtoken = await authenticate(inp_id);
    let city = await getLocation(authtoken);
    let temp = await getWeather(city);
    printDetails(inp_id,city,temp);
    console.log("weather of " + city +" is :" + temp);
    }
    catch(err)
    {
        console.log("Error message:",err);
    }
}
